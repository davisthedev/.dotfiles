# vim:ft=kitty

## name:     Catppuccin Kitty Mocha
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/mocha.conf
## blurb:    Soothing pastel theme for the high-spirited!



# The basic colors
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# The 16 terminal colors

# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8



# User Configs

font_size 13.0
font_family      JetBrainsMono Nerd Font
italic_font    auto
bold_font        auto
bold_italic_font auto

adjust_line_height 105%

window_padding_width 4
window_margin_width 4
single_window_margin_width 4

background_opacity 0.97
dynamic_background_opacity yes

enable_audio_bell no

window_border_width 1.0
window_margin_width 0.0
single_window_margin_width 0.0
# window_padding_width 8.0
# active_border_color #686868
# inactive_border_color #4A4A4A

tab_bar_margin_width 1.0
tab_bar_style separator
tab_separator " │ "
# active_tab_foreground   #e6e6e6
# active_tab_background   #3a3a3a
active_tab_font_style   normal
# inactive_tab_foreground #bfbfbf
# inactive_tab_background #171717
inactive_tab_font_style normal


